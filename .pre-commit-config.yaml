repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.5.0
  hooks:
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-added-large-files
    - id: check-yaml
    - id: check-json

- repo: https://github.com/pycqa/flake8
  rev: 7.0.0
  hooks:
    - id: flake8
      additional_dependencies: [flake8]
      args: ['--max-line-length=100']
      files: \.py$
      exclude: ^(venv|env|\.git)/

- repo: https://github.com/codespell-project/codespell
  rev: v2.2.2
  hooks:
    - id: codespell
      exclude: ^(package-lock\.json|yarn\.lock|\.expo/)

- repo: local
  hooks:
    - id: mask-env
      name: Mask secrets in all files
      entry: python scripts/mask_keys.py
      language: system
      pass_filenames: false        # <-- runs once on whole repo, not per-file
      always_run: true             # <-- ensures it never gets skipped

    - id: check-requirements
      name: Check requirements file syntax
      entry: python scripts/check_requirements.py
      language: system
      pass_filenames: false        # <-- script handles its own file path internally
      files: ^requirements\.txt$
